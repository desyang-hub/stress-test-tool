name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["1.23", "1.24", "1.25"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -count=1 -v ./...

      - name: Build
        run: go build -o stresstest ./cmd/stresstest/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cross compile
        run: |
          GOOS=linux GOARCH=amd64 go build -o stresstest-linux-amd64 ./cmd/stresstest/
          GOOS=linux GOARCH=arm64 go build -o stresstest-linux-arm64 ./cmd/stresstest/
          GOOS=windows GOARCH=amd64 go build -o stresstest-windows.exe ./cmd/stresstest/
          GOOS=darwin GOARCH=amd64 go build -o stresstest-darwin-amd64 ./cmd/stresstest/
          GOOS=darwin GOARCH=arm64 go build -o stresstest-darwin-arm64 ./cmd/stresstest/
