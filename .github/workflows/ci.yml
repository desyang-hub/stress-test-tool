name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["1.24"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -count=1 -v ./...

      - name: Build
        run: go build -o stresstest ./cmd/stresstest/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cross compile
        run: |
          GOOS=linux GOARCH=amd64 go build -o stresstest-linux-amd64 ./cmd/stresstest/
          GOOS=linux GOARCH=arm64 go build -o stresstest-linux-arm64 ./cmd/stresstest/
          GOOS=windows GOARCH=amd64 go build -o stresstest-windows.exe ./cmd/stresstest/
          GOOS=darwin GOARCH=amd64 go build -o stresstest-darwin-amd64 ./cmd/stresstest/
          GOOS=darwin GOARCH=arm64 go build -o stresstest-darwin-arm64 ./cmd/stresstest/

  build-archive:
    runs-on: ubuntu-latest
    needs: [test, lint, cross-compile]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build all platforms
        env:
          GOFLAGS: -mod=readonly
        run: |
          mkdir -p build
          for pair in \
            "linux/amd64" "linux/arm64" "linux/arm" "linux/386" \
            "darwin/amd64" "darwin/arm64" \
            "windows/amd64" "windows/arm64" \
            "windows/386"; do
            os="${pair%/*}"
            arch="${pair#*/}"
            name="stresstest-${os}-${arch}"
            [ "$os" = "windows" ] && name+=".exe"
            GOOS=$os GOARCH=$arch go build -ldflags="-s -w" -o "build/$name" ./cmd/stresstest/
          done

      - name: Create archives
        run: |
          cd build
          for f in stresstest-*; do
            case "$f" in
              *windows-*) ext=".zip" ;;
              *) ext=".tar.gz" ;;
            esac
            case "$f" in
              *windows-*)
                7z a "${f}${ext}" "$f" 2>/dev/null || zip "${f}${ext}" "$f"
                ;;
              *)
                tar -czf "${f}.tar.gz" "$f"
                ;;
            esac
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stresstest-builds
          path: build/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: stresstest:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
