name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Compute version
        id: version
        run: |
          ver="${GITHUB_REF#refs/tags/}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          GOFLAGS: -mod=readonly
        run: |
          set -e
          VER="${{ steps.version.outputs.version }}"
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-linux-amd64" ./cmd/stresstest/
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-linux-arm64" ./cmd/stresstest/
          GOOS=linux GOARCH=arm go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-linux-arm" ./cmd/stresstest/
          GOOS=linux GOARCH=386 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-linux-386" ./cmd/stresstest/

          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-darwin-amd64" ./cmd/stresstest/
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-darwin-arm64" ./cmd/stresstest/

          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-windows-amd64.exe" ./cmd/stresstest/
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-windows-arm64.exe" ./cmd/stresstest/
          GOOS=windows GOARCH=386 go build -ldflags="-s -w -X github.com/urfave/cli/v3.Version=$VER" -o "dist/stresstest-$VER-windows-386.exe" ./cmd/stresstest/

          ls -la dist/

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Create archives
        run: |
          set -e
          cd dist
          zip stresstest-*-windows-amd64.exe.zip stresstest-*-windows-amd64.exe
          zip stresstest-*-windows-arm64.exe.zip stresstest-*-windows-arm64.exe
          zip stresstest-*-windows-386.exe.zip stresstest-*-windows-386.exe
          tar -czf stresstest-*-linux-amd64.tar.gz stresstest-*-linux-amd64
          tar -czf stresstest-*-linux-arm64.tar.gz stresstest-*-linux-arm64
          tar -czf stresstest-*-linux-arm.tar.gz stresstest-*-linux-arm
          tar -czf stresstest-*-linux-386.tar.gz stresstest-*-linux-386
          tar -czf stresstest-*-darwin-amd64.tar.gz stresstest-*-darwin-amd64
          tar -czf stresstest-*-darwin-arm64.tar.gz stresstest-*-darwin-arm64
          ls -la

      - name: Create checksums
        run: |
          set -e
          cd dist
          sha256sum stresstest-*.tar.gz stresstest-*.zip | sort -k2 > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        run: |
          ver="${{ steps.version.outputs.version }}"
          cat > release-notes.txt << EOF
          ## stress-test-utils ${ver}

          Enterprise-grade API stress testing tool with multi-stage load patterns, assertion engine, and rich reporting.

          ### Binaries included
          - Linux: amd64, arm64, arm, 386
          - macOS: amd64, arm64
          - Windows: amd64, arm64, 386
          EOF

      - name: Create GitHub Release
        run: |
          ver="${{ steps.version.outputs.version }}"
          # Delete existing release if it exists (idempotent)
          gh release delete "$ver" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$ver" --target main --title "$ver" --notes-file release-notes.txt -- \
            dist/checksums.txt \
            dist/stresstest-*-linux-amd64.tar.gz \
            dist/stresstest-*-linux-arm64.tar.gz \
            dist/stresstest-*-linux-arm.tar.gz \
            dist/stresstest-*-linux-386.tar.gz \
            dist/stresstest-*-darwin-amd64.tar.gz \
            dist/stresstest-*-darwin-arm64.tar.gz \
            dist/stresstest-*-windows-amd64.exe.zip \
            dist/stresstest-*-windows-arm64.exe.zip \
            dist/stresstest-*-windows-386.exe.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
